<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment | WEST COAST FASHION CLUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            padding-top: 100px;
        }
        .payment-box {
            border: 1px solid #d4af37;
            padding: 50px 30px;
            max-width: 500px;
            margin: auto;
            border-radius: 4px;
            background-color: #0a0a0a;
        }
        h2 {
            font-family: 'Cinzel', serif;
            color: #d4af37;
            letter-spacing: 3px;
        }
        .amount {
            font-size: 2rem;
            font-weight: 600;
            margin: 20px 0;
            color: #fff;
        }
        #rzp-button1 {
            background-color: #d4af37;
            color: #000;
            border: none;
            padding: 18px 40px;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: 0.3s;
        }
        #rzp-button1:hover {
            background-color: #fff;
        }
    </style>
</head>
<body>

    <div class="payment-box">
        <h2>WEST COAST</h2>
        <p style="font-size: 0.8rem; letter-spacing: 4px; color: #888;">FASHION CLUB</p>
        
        <p style="margin-top: 30px; color: #ccc;">Total Amount to Pay</p>
        <div class="amount">₹{{ total }}</div>
        
        <button id="rzp-button1">Pay With Razorpay</button>
    </div>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        var options = {
            "key": "{{ razorpay_key }}", 
            "amount": "{{ payment.amount }}", 
            "currency": "INR",
            "name": "WEST COAST FASHION CLUB",
            "description": "Premium Streetwear Purchase",
            "order_id": "{{ payment.id }}", 
            "handler": function (response){
                // Payment Success ആയാൽ ഇത് നിങ്ങളുടെ payment_success വ്യൂവിലേക്ക് പോകും
                window.location.href = "{% url 'payment_success' %}?payment_id=" + response.razorpay_payment_id + "&order_id={{ order.order_id }}";
            },
            "theme": {
                "color": "#d4af37"
            }
        };
        var rzp1 = new Razorpay(options);
        document.getElementById('rzp-button1').onclick = function(e){
            rzp1.open();
            e.preventDefault();
        }
    </script>
</body>
</html>
