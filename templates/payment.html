<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment | LUXE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --primary-color: #111; --text-muted: #888; --bg-light: #fafafa; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-light); color: var(--primary-color); height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .brand-font { font-family: 'Playfair Display', serif; }

        /* Payment Card */
        .payment-card { background: #fff; padding: 50px 40px; border-radius: 4px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); text-align: center; max-width: 450px; width: 100%; border: 1px solid #eee; }
        
        .brand-logo { font-size: 2.2rem; letter-spacing: 4px; font-weight: 600; color: #111; text-decoration: none; margin-bottom: 30px; display: inline-block; }
        
        .amount-display { font-size: 2.5rem; font-weight: 600; margin: 20px 0; color: #111; }
        .amount-display span { font-size: 1rem; font-weight: 400; color: var(--text-muted); vertical-align: middle; margin-right: 5px; }

        /* Loader Animation */
        .loader { width: 40px; height: 40px; border: 3px solid #f3f3f3; border-top: 3px solid #111; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Pay Button */
        .btn-pay { background: #111; color: #fff; width: 100%; border: none; padding: 18px; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; font-size: 0.9rem; transition: all 0.3s ease; margin-top: 20px; border-radius: 2px; }
        .btn-pay:hover { background: #333; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        /* Security Text */
        .security-badge { font-size: 0.7rem; color: #28a745; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-top: 30px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .warning-text { font-size: 0.75rem; color: var(--text-muted); margin-top: 15px; }
        
        /* Gateway Logos */
        .gateway-logos { margin-top: 25px; opacity: 0.5; filter: grayscale(100%); display: flex; justify-content: center; gap: 15px; }
        .gateway-logos img { height: 18px; }
    </style>
</head>
<body>

    <div class="payment-card">
        <a class="navbar-brand m-0 d-flex flex-column align-items-center text-decoration-none" href="{% url 'home' %}" style="line-height: 1;">
                <span class="brand-font" style="font-size: 1.8rem; letter-spacing: 6px; color: var(--text-main);">WEST COAST</span>
                <span style="font-family: 'Montserrat', sans-serif; font-size: 0.55rem; letter-spacing: 8px; font-weight: 600; color: var(--accent-color); margin-top: 5px;">FASHION CLUB</span>
            </a>
        
        <div class="loader" id="loader"></div>
        
        <h5 class="fw-bold mb-1" id="status-text">Initializing Payment...</h5>
        <p class="text-muted small mb-4">Please complete your secure transaction.</p>

        <div class="amount-display">
            <span>INR</span>₹{{ total }}
        </div>

        <button id="rzp-button1" class="btn-pay">
            <i class="fas fa-lock me-2"></i> Pay Securely
        </button>

        <div class="warning-text">
            <i class="fas fa-exclamation-triangle me-1"></i> Please do not refresh this page or click back button.
        </div>

        <div class="security-badge">
            <i class="fas fa-shield-check fs-5"></i> 100% Secure Payment by Razorpay
        </div>

        <div class="gateway-logos">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e1/UPI-Logo-vector.svg" alt="UPI">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" alt="Visa">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" alt="Mastercard">
        </div>
    </div>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        var options = {
            "key": "{{ razorpay_key }}", // Your Razorpay Key ID from views.py
            "amount": "{{ payment.amount }}", // Amount in paise
            "currency": "INR",
            "name": "LUXE",
            "description": "Order Transaction",
            // "image": "https://yourwebsite.com/logo.png", // Optional: Add your logo URL here
            "order_id": "{{ payment.id }}", // Razorpay Order ID
            "handler": function (response){
                // Payment Success - Redirecting to success page
                document.getElementById('status-text').innerText = "Payment Successful! Redirecting...";
                document.getElementById('loader').style.borderColor = "#28a745";
                document.getElementById('loader').style.borderTopColor = "#28a745";
                
                window.location.href = "/payment_success/?payment_id=" + response.razorpay_payment_id + "&order_id=" + response.razorpay_order_id;
            },
            "prefill": {
                "name": "{{ order.full_name }}",
                "email": "{{ order.email }}",
                "contact": "{{ order.phone }}"
            },
            "theme": {
                "color": "#111111" // Matches your website's primary dark color
            },
            "modal": {
                "ondismiss": function(){
                    // If user closes the popup
                    document.getElementById('status-text').innerText = "Payment Cancelled";
                    document.getElementById('loader').style.display = "none";
                }
            }
        };
        
        var rzp1 = new Razorpay(options);
        
        // Auto-open Razorpay popup when this page loads
        window.onload = function(e){
            rzp1.open();
        };

        // If user closes the popup, they can click the button to try again
        document.getElementById('rzp-button1').onclick = function(e){
            document.getElementById('status-text').innerText = "Awaiting Payment...";
            document.getElementById('loader').style.display = "block";
            rzp1.open();
            e.preventDefault();
        }
    </script>
</body>
</html>
