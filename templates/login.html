<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account | WEST COAST FASHION CLUB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { 
            --bg-main: #0a0a0a; --bg-card: #151515; --text-main: #ffffff; 
            --text-muted: #999999; --border-color: #333333; --accent-color: #d4af37; 
        }
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: linear-gradient(rgba(10, 10, 10, 0.8), rgba(10, 10, 10, 0.95)), url('https://images.unsplash.com/photo-1445205170230-053b83016050?q=80&w=2071&auto=format&fit=crop') center/cover no-repeat; 
            background-attachment: fixed;
            color: var(--text-main); 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        
        .brand-font { font-family: 'Cinzel', serif; letter-spacing: 3px; }

        .auth-card {
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
        }

        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header h2 { color: var(--accent-color); font-size: 2rem; letter-spacing: 4px; margin-bottom: 5px; }

        /* 🌟 Toggle Buttons 🌟 */
        .tab-container {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 15px 10px;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }
        .tab-btn.active {
            color: var(--accent-color);
        }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent-color);
        }
        .tab-btn:hover:not(.active) { color: #fff; }

        /* Form Inputs */
        .form-control {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-main);
            padding: 15px 20px;
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent-color);
            box-shadow: none;
            color: white;
        }
        .form-control::placeholder { color: #666; }

        .btn-gold {
            background: var(--accent-color);
            color: #000;
            border: 1px solid var(--accent-color);
            padding: 15px;
            width: 100%;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 4px;
            transition: 0.3s;
            margin-top: 15px;
        }
        .btn-gold:hover { background: transparent; color: var(--accent-color); }

        .alert-error {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
            padding: 10px;
            border-radius: 4px;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 20px;
        }

        .back-home {
            position: absolute;
            top: 25px;
            left: 25px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .back-home:hover { color: var(--accent-color); }

        /* Animation for forms */
        .fade-in { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <a href="{% url 'home' %}" class="back-home d-none d-md-block"><i class="fas fa-arrow-left me-2"></i> Back to Store</a>

    <div class="auth-card">
        <div class="auth-header">
            <h2 class="brand-font">WEST COAST</h2>
        </div>

        <div class="tab-container">
            <button class="tab-btn active" id="btn-login" onclick="showForm('login')">Sign In</button>
            <button class="tab-btn" id="btn-register" onclick="showForm('register')">Create Account</button>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert-error">
                    <i class="fas fa-exclamation-circle me-2"></i>{{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <div id="login-form" class="fade-in">
            <form action="{% url 'login' %}" method="POST">
                {% csrf_token %}
                <div class="mb-4">
                    <input type="text" name="username" class="form-control" placeholder="Username" required>
                </div>
                <div class="mb-4">
                    <input type="password" name="password" class="form-control" placeholder="Password" required>
                </div>
                <div class="text-end mb-3">
                    <a href="#" style="color: var(--text-muted); font-size: 0.8rem; text-decoration: none; transition: 0.3s;" onmouseover="this.style.color='var(--accent-color)'" onmouseout="this.style.color='var(--text-muted)'">Forgot Password?</a>
                </div>
                <button type="submit" class="btn-gold">Sign In</button>
            </form>
        </div>

        <div id="register-form" style="display: none;" class="fade-in">
            <form action="{% url 'register' %}" method="POST">
                {% csrf_token %}
                <div class="row">
                    <div class="col-6 mb-3">
                        <input type="text" name="first_name" class="form-control" placeholder="First Name" required>
                    </div>
                    <div class="col-6 mb-3">
                        <input type="text" name="last_name" class="form-control" placeholder="Last Name" required>
                    </div>
                </div>
                <div class="mb-3">
                    <input type="email" name="email" class="form-control" placeholder="Email Address" required>
                </div>
                <div class="mb-3">
                    <input type="text" name="username" class="form-control" placeholder="Choose a Username" required>
                </div>
                <div class="mb-3">
                    <input type="password" name="password" class="form-control" placeholder="Create Password" required>
                </div>
                <div class="mb-4">
                    <input type="password" name="confirm_password" class="form-control" placeholder="Confirm Password" required>
                </div>
                <button type="submit" class="btn-gold">Sign Up</button>
            </form>
        </div>

    </div>

    <script>
        // 🌟 JavaScript to Toggle Forms 🌟
        function showForm(formType) {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const btnLogin = document.getElementById('btn-login');
            const btnRegister = document.getElementById('btn-register');

            if (formType === 'login') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                btnLogin.classList.add('active');
                btnRegister.classList.remove('active');
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                btnLogin.classList.remove('active');
                btnRegister.classList.add('active');
            }
        }
    </script>
</body>
</html>
