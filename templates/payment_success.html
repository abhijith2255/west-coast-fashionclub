<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful | WEST COAST FASHION CLUB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            background-color: #0a0a0a;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            padding-top: 80px;
        }
        .success-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 50px 30px;
            border: 1px solid #d4af37;
            border-radius: 4px;
            background-color: #121212;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.05);
        }
        .success-icon {
            font-size: 4.5rem;
            color: #d4af37;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }
        h1 {
            font-family: 'Cinzel', serif;
            color: #d4af37;
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-size: 2rem;
        }
        .order-details {
            margin-top: 35px;
            padding: 25px;
            border-top: 1px dashed #333;
            border-bottom: 1px dashed #333;
            text-align: left;
            background: rgba(0, 0, 0, 0.3);
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: #888;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .detail-row:last-child {
            margin-bottom: 0;
        }
        .detail-value {
            color: #fff;
            font-weight: 500;
            font-family: 'Montserrat', sans-serif;
        }
        .btn-continue {
            display: inline-block;
            margin-top: 40px;
            padding: 15px 40px;
            background-color: #d4af37;
            color: #000;
            text-decoration: none;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
            border: 1px solid #d4af37;
        }
        .btn-continue:hover {
            background-color: transparent;
            color: #d4af37;
        }
        .brand-text {
            margin-top: 40px;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            letter-spacing: 4px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="success-container">
            <i class="fas fa-check-circle success-icon"></i>
            <h1>Payment Successful</h1>
            <p style="color: #aaa; letter-spacing: 1px; font-size: 0.9rem;">Thank you for your premium purchase.</p>

            <div class="order-details">
                <div class="detail-row">
                    <span>Payment ID</span>
                    <span class="detail-value">{{ payment_id }}</span>
                </div>
                <div class="detail-row">
                    <span>Order Number</span>
                    <span class="detail-value">#{{ order_id }}</span>
                </div>
                <div class="detail-row">
                    <span>Status</span>
                    <span class="detail-value" style="color: #4CAF50;">Confirmed</span>
                </div>
            </div>

            <p style="margin-top: 25px; font-size: 0.8rem; color: #777; line-height: 1.6;">
                We have received your order and will begin processing it shortly. You will receive an email confirmation soon.
            </p>

            <a href="{% url 'home' %}" class="btn-continue">Continue Shopping</a>
        </div>
        
        <div class="brand-text">WEST COAST FASHION CLUB</div>
    </div>

</body>
</html>
